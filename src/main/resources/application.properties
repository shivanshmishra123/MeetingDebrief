spring.application.name=demo

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-purple-math-aqot32w1-pooler.c-8.us-east-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_fEcXp3bJe4jK}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Audio file upload limits
# Default Spring limit is 1MB — way too small for audio files.
# We allow up to 100MB per file and 100MB total per request.
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB

# JWT Configuration
# Secret must be at least 256 bits (32 chars). Change this in production!
jwt.secret=${JWT_SECRET:debrief-io-super-secret-signing-key-must-be-long-enough-256-bits}
# 30 days in milliseconds: 30 * 24 * 60 * 60 * 1000
jwt.expiration-ms=${JWT_EXPIRATION_MS:2592000000}

# Python AI Service URL
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}
