spring.application.name=demo

spring.datasource.url=jdbc:postgresql://localhost:5432/debrief_db
spring.datasource.username=postgres
spring.datasource.password=cement

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Audio file upload limits
# Default Spring limit is 1MB — way too small for audio files.
# We allow up to 100MB per file and 100MB total per request.
spring.servlet.multipart.max-file-size=100MB
spring.servlet.multipart.max-request-size=100MB
